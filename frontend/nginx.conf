# nginx serves the React build AND acts as the edge gateway: it proxies /api ->
# the api service and /stream -> the api SSE endpoint. This gives the browser a
# single origin (no CORS) and keeps the API private behind the gateway.

server {
    listen 8050;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # SPA: serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache hashed assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API gateway: /api/* -> api:8000/*
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Deployed detection model: /detect/* -> detection:9000/*. Uses a variable +
    # Docker's DNS resolver so nginx still starts when the (profile-gated) detection
    # service is absent; requests then return 502, which the UI handles gracefully.
    location /detect/ {
        resolver 127.0.0.11 valid=10s;
        set $detect_upstream http://detection:9000;
        proxy_pass $detect_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;          # detection can take a couple of minutes
        client_max_body_size 200m;        # allow video uploads
    }

    # SSE: /stream/* -> api:8000/stream/* (no buffering, long-lived)
    location /stream/ {
        proxy_pass http://api:8000/stream/;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }
}
