# Store Intelligence — full stack. `docker compose up` starts everything (acceptance gate #1).
# Detection runs on the host (GPU); the `replayer` streams its events.jsonl into the API
# in simulated real time and publishes to Redis for the live dashboard.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: storeiq
      POSTGRES_PASSWORD: storeiq
      POSTGRES_DB: storeiq
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storeiq -d storeiq"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+psycopg://storeiq:storeiq@postgres:5432/storeiq
      REDIS_URL: redis://redis:6379/0
      STORE_LAYOUT_PATH: /app/data/store_layout.json
      POS_CSV_PATH: /app/data/pos_transactions.csv
      LOG_LEVEL: INFO
    volumes:
      - ./data:/app/data:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Streams pre-computed detection events (events.jsonl) into the API in simulated
  # real time. This is the bridge between the offline GPU pipeline and the live API.
  replayer:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m pipeline.replay
    environment:
      API_URL: http://api:8000
      REDIS_URL: redis://redis:6379/0
      EVENTS_PATH: /app/pipeline/output/events.jsonl
      REPLAY_SPEED: "20"   # 20x real time; set to 1 for true real-time demo
    volumes:
      - ./pipeline/output:/app/pipeline/output:ro
    depends_on:
      api:
        condition: service_started
    restart: on-failure

  # React (Vite + Tailwind) dashboard served by nginx, which also acts as the edge
  # gateway proxying /api and /stream to the api service (single origin, no CORS).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8050:8050"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
