# Store Intelligence — full stack. `docker compose up` starts everything (acceptance gate #1).
# Detection runs on the host (GPU); the `replayer` streams its events.jsonl into the API
# in simulated real time and publishes to Redis for the live dashboard.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: storeiq
      POSTGRES_PASSWORD: storeiq
      POSTGRES_DB: storeiq
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storeiq -d storeiq"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+psycopg://storeiq:storeiq@postgres:5432/storeiq
      REDIS_URL: redis://redis:6379/0
      STORE_LAYOUT_PATH: /app/data/store_layout.json
      POS_CSV_PATH: /app/data/pos_transactions.csv
      LOG_LEVEL: INFO
    volumes:
      - ./data:/app/data:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # NOTE: the dashboard starts EMPTY by design (waiting for a clip). Populate it
  # from the dashboard's empty state: "Full store day" (POST /demo/seed, instant),
  # "Watch a demo" on a real clip (detection service), or upload your own video.
  # The standalone `pipeline/replay.py` streamer still exists for a CLI live demo.

  # The DEPLOYED MODEL: YOLOv8 + ByteTrack served in-container. Upload a video and
  # it produces events that flow onto the live dashboard. Heavy image (torch+CV),
  # so it lives behind the `full` profile to keep the default gate fast:
  #   docker compose up                        -> core stack (acceptance gate)
  #   docker compose --profile full up --build -> + deployed detection + upload UI
  detection:
    build:
      context: .
      dockerfile: detection_service/Dockerfile
    profiles: ["full"]
    environment:
      API_URL: http://api:8000
      REDIS_URL: redis://redis:6379/0
      STORE_LAYOUT_PATH: /app/data/store_layout.json
      YOLO_MODEL: yolov8n.pt
      DEVICE: cpu
      DEMO_DIR: /app/clips
    volumes:
      # mount the CCTV clips read-only so "Watch a Demo" can run them server-side
      - "../CCTV Footage-20260529T160731Z-3-00144614ea/CCTV Footage:/app/clips:ro"
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  # React (Vite + Tailwind) dashboard served by nginx, which also acts as the edge
  # gateway proxying /api, /stream and /detect to the backend services.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8050:8050"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
